<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelWise AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container {
            height: calc(100vh - 180px);
        }
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#2B1B17] min-h-screen text-[#F5E6D3]">
    <div class="max-w-4xl mx-auto p-4">
        <div class="bg-[#3D2821] rounded-t-lg shadow-sm p-4 border-b border-[#4E362F]">
            <h1 class="text-2xl font-bold text-[#FFF3E0]">✈️ TravelWise AI Agent</h1>
            <p class="text-[#D7CCC8] text-sm">Your intelligent travel assistant</p>
        </div>

        <div id="chatContainer" class="chat-container bg-[#33221C] overflow-y-auto p-4 space-y-4 shadow-sm">
            <div class="flex justify-start">
                <div class="bg-[#EFEBE9] text-[#2B1B17] rounded-lg px-4 py-2 max-w-[80%] shadow-sm">
                    <p class="message-content">Hello! I'm your TravelWise AI assistant. How can I help you with your travel plans today?</p>
                </div>
            </div>
        </div>

        <div class="bg-[#3D2821] rounded-b-lg shadow-sm p-4 border-t border-[#4E362F]">
            <form id="chatForm" class="flex gap-2">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message here..."
                    class="flex-1 bg-[#FFFDF9] text-[#2B1B17] border border-[#5C4033] rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#8B5A2B] focus:border-transparent placeholder-gray-500"
                    autocomplete="off"
                >
                <button
                    type="submit"
                    id="sendButton"
                    class="bg-[#6E473B] hover:bg-[#5C3A30] text-[#FFF3E0] font-semibold px-6 py-2 rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Send
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        let sessionId = null;
        let isStreaming = false;

        async function createSession() {
            try {
                const response = await fetch('/api/session/create?user_id=demo_user', {
                    method: 'POST'
                });
                const data = await response.json();
                sessionId = data.session_id;
                console.log('Session created:', sessionId);
            } catch (error) {
                console.error('Failed to create session:', error);
            }
        }

        // Updated bubble generation logic to apply theme dynamically
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

            const bubbleDiv = document.createElement('div');
            // User: Darker Roasted Caramel bubble | AI: Soft Beige Cream bubble
            bubbleDiv.className = `${isUser ? 'bg-[#CD853F] text-[#FFFDF9]' : 'bg-[#EFEBE9] text-[#2B1B17]'} rounded-lg px-4 py-2 max-w-[80%] shadow-sm`;

            const contentP = document.createElement('p');
            contentP.className = 'message-content';
            contentP.textContent = content;

            bubbleDiv.appendChild(contentP);
            messageDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex justify-start';
            messageDiv.id = 'typingIndicator';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bg-[#EFEBE9] text-[#2B1B17] rounded-lg px-4 py-2';

            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'typing-indicator flex space-x-1';
            indicatorDiv.innerHTML = '<span class="w-2 h-2 bg-[#2B1B17] rounded-full"></span><span class="w-2 h-2 bg-[#2B1B17] rounded-full"></span><span class="w-2 h-2 bg-[#2B1B17] rounded-full"></span>';

            bubbleDiv.appendChild(indicatorDiv);
            messageDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function streamResponse(userMessage) {
            isStreaming = true;
            sendButton.disabled = true;
            messageInput.disabled = true;

            const typingIndicator = addTypingIndicator();
            let assistantMessageDiv = null;
            let fullResponse = '';

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: 'demo_user',
                        session_id: sessionId,
                        message: userMessage
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                removeTypingIndicator();
                assistantMessageDiv = addMessage('', false);
                const contentP = assistantMessageDiv.querySelector('.message-content');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    fullResponse += chunk;
                    contentP.textContent = fullResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

            } catch (error) {
                console.error('Streaming error:', error);
                removeTypingIndicator();
                addMessage(`Sorry, there was an error: ${error.message}`, false);
            } finally {
                isStreaming = false;
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            addMessage(message, true);
            messageInput.value = '';
            await streamResponse(message);
        });

        createSession();
    </script>
</body>
</html>
