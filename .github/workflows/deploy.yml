name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clean out any credential helpers
          git config --global --unset-all credential.helper || true
          
          # 2. Encode the token to basic auth and inject it cleanly into the git config header
          git config --global http.https://huggingface.co/.extraheader "Authorization: Basic $(echo -n "saminasyd76:$HF_TOKEN" | base64)"
          
          # 3. Configure a placeholder profile for the runner environment
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 4. Push directly to the clean HTTPS URL without any messy embedded strings
          git push --force https://huggingface.co/spaces/saminasyd76/travelwise-agent main:main