name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Explicitly set up the remote repository URL with your username and token injected safely
          git remote set-url origin https://saminasyd76:$HF_TOKEN@huggingface.co/spaces/saminasyd76/travelwise-agent
          
          # 2. Force push directly to the newly configured remote origin
          git push origin main:main --force